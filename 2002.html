3, 19.399999618530277, 19.100000381469727, 19.0, 19.049999237060547, 18.799999237060547, 18.649999618530277, 18.600000381469727, 18.950000762939453], "volume": [99618.0, 62471.0, 36752.0, 42057.0, 49161.0, 23858.0, 54757.0, 36760.0, 22126.0, 37165.0], "ma5": [null, null, null, null, 19.230000305175782, 19.15, 19.06999969482422, 18.91999969482422, 18.81999969482422, 18.809999847412108], "ma10": [null, null, null, null, null, null, null, null, null, 19.020000076293947], "ma20": [null, null, null, null, null, null, null, null, null, null], "ma60": [null, null, null, null, null, null, null, null, null, null], "bb_u": [null, null, null, null, null, null, null, null, null, null], "bb_l": [null, null, null, null, null, null, null, null, null, null], "bb_m": [null, null, null, null, null, null, null, null, null, null], "rsi": [50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0, 50.0], "k": [null, null, null, null, null, null, null, 50.0, 34.52383547410277, 32.53972579017129], "d": [null, null, null, null, null, null, null, 50.0, 44.84127849136758, 40.74076092430215], "macd_line": [0.0, -0.019943019943021056, -0.01938629757269794, -0.04266075567971939, -0.06838680593004653, -0.08377466335860717, -0.11481899993814793, -0.1497987887656933, -0.17948604064662987, -0.17277960025779393], "signal_line": [0.0, -0.003988603988604212, -0.007068142705422958, -0.014186665300282245, -0.025026693426235105, -0.036776287412709524, -0.05238482991779721, -0.07186762168737643, -0.09339130547922711, -0.10926896443494048], "hist": [0.0, -0.015954415954416844, -0.012318154867274982, -0.028474090379437142, -0.04336011250381143, -0.04699837594589765, -0.06243417002035072, -0.07793116707831688, -0.08609473516740276, -0.06351063582285345], "_last": {"close": 18.950000762939453, "chg": 0.35000038146972656, "pct": 1.8817224424275543, "date": "2026-07-03", "rsi": 50.0, "k": 32.53972579017129, "d": 40.74076092430215, "macd": -0.17277960025779393, "hist": -0.06351063582285345}}}};
let showRSI = true, showKD = true, showMACD = true;

function switchStock() {
  const sel = document.getElementById('stockSel').value;
  const days = parseInt(document.getElementById('daysSel').value);
  const d = allData[sel][days];
  if (!d) { alert('無可用資料'); return; }
  render(d);
}

function toggleIndicators() {
  showRSI  = !showRSI;
  showKD   = !showKD;
  showMACD = !showMACD;
  const sel = document.getElementById('stockSel').value;
  const days = parseInt(document.getElementById('daysSel').value);
  render(allData[sel][days]);
}

function render(d) {
  const rsiVis = showRSI;
  const kdVis  = showKD;
  const macdVis= showMACD;
  document.getElementById('rsiChart').style.display  = (rsiVis  && d.rsi.length > 0) ? 'block' : 'none';
  document.getElementById('macdChart').style.display = macdVis && d.macd.some(x=>x!==null) ? 'block' : 'none';

  // Layout shared config
  const layoutShared = {
    paper_bgcolor:'#0d1117', plot_bgcolor:'#0d1117',
    font:{ color:'#e6edf3', family:'Noto Sans CJK TC,sans-serif', size:11 },
    margin:{l:60, r:10, t:10, b:30},
    xaxis:{
      gridcolor:'#21262d', linecolor:'#30363d', tickcolor:'#30363d',
      rangeslider:{visible:false}, type:'linear',
    },
    yaxis:{ gridcolor:'#21262d', linecolor:'#30363d', tickcolor:'#30363d' },
    showlegend:false, hovermode='x unified',
  };

  // ── K線圖 ──────────────────────────────────────────────
  const klineTraces = [
    {
      x:d.dates, open:d.open, high:d.high, low:d.low, close:d.close,
      type:'candlestick', name:'K',
      increasing:{line:{color:'#ef4444', width:1},  fillcolor:'rgba(239,68,68,0.5)'},
      decreasing:{line:{color:'#22c55e', width:1}, fillcolor:'rgba(34,197,94,0.5)'},
    },
    { x:d.dates, y:d.ma5,  type:'scatter', mode:'lines', name:'MA5',  line:{color:'#FFA726', width:1.5}, hoverinfo:'y+name' },
    { x:d.dates, y:d.ma10, type:'scatter', mode:'lines', name:'MA10', line:{color:'#AB47BC', width:1.5}, hoverinfo:'y+name' },
    { x:d.dates, y:d.ma20, type:'scatter', mode:'lines', name:'MA20', line:{color:'#42A5F5', width:2},   hoverinfo:'y+name' },
    { x:d.dates, y:d.ma60, type:'scatter', mode:'lines', name:'MA60', line:{color:'#B2DFDB', width:1.5}, hoverinfo:'y+name' },
    { x:d.dates, y:d.bb_u, type:'scatter', mode:'lines', name:'BB Up',   line:{color:'rgba(66,165,245,0.4)', width:0.8, dash:'dot'}, showlegend:false, hoverinfo:'skip' },
    { x:d.dates, y:d.bb_l, type:'scatter', mode:'lines', name:'BB Lo',   line:{color:'rgba(66,165,245,0.4)', width:0.8, dash:'dot'}, showlegend:false, hoverinfo:'skip' },
    {
      x:d.dates.concat(d.dates.slice().reverse()), y:d.bb_u.concat(d.bb_l.slice().reverse()),
      type:'scatter', fill='toself', fillcolor='rgba(66,165,245,0.06)',
      line:{color:'transparent'}, name:'BB', showlegend:false, hoverinfo:'skip',
    },
  ];
  Plotly.newPlot('klineChart', klineTraces, {
    ...layoutShared,
    yaxis:{ ...layoutShared.yaxis, title:'Price (TWD)' },
    height:480,
  }, {responsive:true, displayModeBar:true, modeBarButtons:[['zoomIn','zoomOut','resetScale']]});

  // ── 成交量 ──────────────────────────────────────────────
  const volColors = d.close.map((c,i)=> c>=d.open[i] ? '#ef4444' : '#22c55e');
  const volTrace = [{
    x:d.dates, y:d.volume, type:'bar', name:'Vol',
    marker:{color:volColors, opacity:0.75},
    hovertemplate:'Vol: %{y:.0f}<extra></extra>',
  }];
  Plotly.newPlot('volChart', volTrace, {
    ...layoutShared, height:140,
    yaxis:{ ...layoutShared.yaxis, title:'Volume' },
  }, {responsive:true, displayModeBar:false});

  // ── RSI + KD ────────────────────────────────────────────
  const rsiTraces = [];
  if (rsiVis && d.rsi.length > 0) {
    rsiTraces.push({
      x:d.dates, y:d.rsi, type:'scatter', mode:'lines', name:'RSI(14)',
      line:{color:'#E040FB', width:1.5},
      hovertemplate:'RSI: %{y:.1f}<extra></extra>',
    });
    if (kdVis && d.k.length > 0) {
      rsiTraces.push({
        x:d.dates, y:d.k, type:'scatter', mode:'lines', name:'K(9)',
        line:{color:'#FF7043', width:1.2}, hovertemplate='K: %{y:.1f}<extra></extra>',
      });
      rsiTraces.push({
        x:d.dates, y:d.d, type:'scatter', mode:'lines', name:'D(9)',
        line:{color:'#26C6DA', width:1.2}, hovertemplate='D: %{y:.1f}<extra></extra>',
      });
    }
    rsiTraces.push({
      x:d.dates, y:Array(d.dates.length).fill(70),
      type:'scatter', mode:'lines', name:'OB',
      line:{color:'rgba(239,68,68,0.35)', width:0.8, dash:'dash'}, hoverinfo:'skip',
    });
    rsiTraces.push({
      x:d.dates, y:Array(d.dates.length).fill(30),
      type:'scatter', mode:'lines', name:'OS',
      line:{color:'rgba(34,197,94,0.35)', width:0.8, dash:'dash'}, hoverinfo:'skip',
    });
  }
  Plotly.newPlot('rsiChart', rsiTraces.length ? rsiTraces : [{x:[],y:[]}], {
    ...layoutShared, height:160,
    yaxis:{ ...layoutShared.yaxis, title:'RSI / KD', range:[0,100] },
  }, {responsive:true, displayModeBar:false});

  // ── MACD ────────────────────────────────────────────────
  const macdTraces = [];
  if (macdVis && d.macd.some(x=>x!==null)) {
    macdTraces.push({
      x:d.dates, y:d.hist, type:'bar', name:'Hist',
      marker:{color:d.hist.map(h=>h>=0?'#ef4444':'#22c55e')},
      hovertemplate:'Hist: %{y:.3f}<extra></extra>',
    });
    macdTraces.push({
      x:d.dates, y:d.macd_line, type:'scatter', mode:'lines', name:'MACD',
      line:{color:'#29B6F6', width:1.5}, hovertemplate='MACD: %{y:.3f}<extra></extra>',
    });
    macdTraces.push({
      x:d.dates, y:d.signal_line, type:'scatter', mode:'lines', name='Signal',
      line:{color:'#FFA726', width:1.2}, hovertemplate='Sig: %{y:.3f}<extra></extra>',
    });
  }
  Plotly.newPlot('macdChart', macdTraces.length ? macdTraces : [{x:[],y:[]}], {
    ...layoutShared, height:160,
    yaxis:{ ...layoutShared.yaxis, title:'MACD' },
  }, {responsive:true, displayModeBar:false});
}

// Initial render
const initStock = document.getElementById('stockSel').value;
const initDays  = parseInt(document.getElementById('daysSel').value);
if (allData[initStock] && allData[initStock][initDays]) {
  render(allData[initStock][initDays]);
} else {
  // render placeholder
  ['klineChart','volChart','rsiChart','macdChart'].forEach(id => {
    Plotly.newPlot(id, [{x:[],y:[]}], {paper_bgcolor:'#0d1117', font:{color:'#8b949e'}, margin:{l:0,r:0,t:0,b:0}}, {displayModeBar:false});
  });
}
</script>
